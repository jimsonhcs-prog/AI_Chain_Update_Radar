name: Daily AI Radar Update

on:
  schedule:
    - cron: '0 10 * * 1-5'
  
  workflow_dispatch:

jobs:
  update-radar-data:
    runs-on: ubuntu-latest
    
    # 【新增】強制設定使用 Node.js 24 以符合 GitHub 最新的執行標準
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    permissions:
      contents: write
    # ... 以下保持不變

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance beautifulsoup4

      - name: Run Quant Data Injector
        run: python update_radar.py

      - name: Commit and Push Changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 auto: 更新 AI 產業總表量化數據" && git push)

      - name: Send Telegram Notification
        if: success()
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          PAGES_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          MESSAGE="🤖 <b>Oppa Quant Bot 盤後戰報</b>%0A今日 AI 產業大小聯盟數據已更新完畢！%0A🔗 點此觀看：$PAGES_URL"
          curl -s -X POST "https://api.telegram.org/bot$TG_BOT_TOKEN/sendMessage" \
            -d chat_id="$TG_CHAT_ID" \
            -d parse_mode="HTML" \
            -d text="$MESSAGE"
